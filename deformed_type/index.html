<!DOCTYPE html>
<html>
  <head>
    <script src="p5-patched.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/addons/p5.sound.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>
  <body>
    <script src="sketch.js"></script>
    <script> 
    	function snapStrengthChanged(e) {
    		snapStrength = e.value;
    		document.getElementById('snapStrength').innerHTML = '' + snapStrength;
    		renderText();
			}
			function snapDistanceChanged(e) {
    		snapDistance = e.value;
    		document.getElementById('snapDistance').innerHTML = '' + snapDistance;
    		renderText();
			}
			function snapXChanged(e) {
    		snapX = e.value * 1.0;
    		document.getElementById('snapX').innerHTML = '' + snapX;
    		renderText();
			}
			function snapYChanged(e) {
    		snapY = e.value * 1.0;
    		document.getElementById('snapY').innerHTML = '' + snapY;
    		renderText();
			}
      function download(){
        font.download();
      }
    </script>
    <div id="title">
        <h1> Be A Design Brutalist! </h1>
    </div>
    

    <div id="setting">
        <p> 
        Select Typeface:
        <select id="fontselect" onchange="renderText()">
            <option value="leaguegothic">League Gothic Regular</option>
            <option value="cinzel">Cinzel</option>
            <option value="chopinscript">Chopin Script</option>
            <option value="nexa" selected="">Nexa</option>
        </select>
        </p>

        <div id="twocol">
            <div class="col">
                <label>Strength <input type="range" min="0" max="100" value="15" oninput="snapStrengthChanged(this)"/><span id="snapStrength">15</span></label>
                <br>
                <label>Distance<input type="range" min="1" max="1000" value="15" oninput="snapDistanceChanged(this)"/><span id="snapDistance">15</span></label>
            </div>
            <div class="col">
                <label>X<input type="range" min="-1000" max="1000" value="0" oninput="snapXChanged(this)"/><span id="snapX">0</span></label>
                <br>
                <label>Y<input type="range" min="-1000" max="1000" value="0" oninput="snapYChanged(this)"/><span id="snapY">0</span></label>
                <br>
            </div>
        </div>
    </div>

    <div id="preview">
        <button id="download" onclick="download()">I want this brutal font!</button> 
        <p> Preview:  </p>
    </div>
  </body>
</html>
